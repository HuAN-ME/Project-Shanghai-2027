name: Project Shanghai - Enterprise CI

on:
  push:
    branches:
      - master

jobs:

# ========================
# 1️⃣ BUILD JOB
# ========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Build Directory
        run: |
          mkdir -p build
          echo "Project Shanghai Build v1.0" > build/app.txt
          echo "build completed"

      - name: Show Build Output
        run: ls -R build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/

# ========================
# 2️⃣ TEST JOB
# ========================
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Verify File Exists
        run: |
          ls -R
          test -f app.txt && echo "File exists ✔"

      - name: Simulate Tests
        run: |
          echo "Running unit tests..."
          grep "Project Shanghai" app.txt
          echo "Tests passed ✔"

# ========================
# 3️⃣ REPORT JOB
# ========================
  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Final Report
        run: |
          echo "======================"
          echo "CI PIPELINE RESULT"
          echo "BUILD ✔"
          echo "TEST ✔"
          echo "REPORT ✔"
          echo "Project Shanghai CI SUCCESS 🚀"
