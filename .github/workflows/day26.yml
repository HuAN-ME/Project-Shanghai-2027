name: Build and Push Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          podman build -t ghcr.io/${{ github.repository_owner }}/project-shanghai:latest .

      - name: Push Image
        run: |
          podman push ghcr.io/${{ github.repository_owner }}/project-shanghai:latest
